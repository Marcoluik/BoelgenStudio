# bolgenstudio.com (and .dk if used) is served by Netlify, but Shopify issues
# checkout URLs on your primary domain and 301s from *.myshopify.com → that domain.
# Without these rules, /cart/* and /checkouts/* hit static hosting → 404.
#
# IMPORTANT: Must match Admin → Settings → Domains → “Shopify domain” (*.myshopify.com).
# (Network traces showed boelgenstudio — change if yours is bolgenstudio, etc.)
[[redirects]]
  from = "/cart/*"
  to = "https://boelgenstudio.myshopify.com/cart/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/checkouts/*"
  to = "https://boelgenstudio.myshopify.com/checkouts/:splat"
  status = 200
  force = true
